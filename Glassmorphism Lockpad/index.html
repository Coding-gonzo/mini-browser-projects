<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Lockpad</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-fx">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme">
        <svg id="themeIcon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>

    <div class="glass-card" id="card">
        <div class="icon-area" id="lockIcon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        </div>

        <h2>Restricted Access</h2>

        <div class="pin-display">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="keypad">
            <button class="key" onclick="input(1)">1</button>
            <button class="key" onclick="input(2)">2</button>
            <button class="key" onclick="input(3)">3</button>
            
            <button class="key" onclick="input(4)">4</button>
            <button class="key" onclick="input(5)">5</button>
            <button class="key" onclick="input(6)">6</button>
            
            <button class="key" onclick="input(7)">7</button>
            <button class="key" onclick="input(8)">8</button>
            <button class="key" onclick="input(9)">9</button>
            
            <button class="key" onclick="backspace()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg>
            </button>
            <button class="key" onclick="input(0)">0</button>
            <button class="key key-submit" onclick="verify()">GO</button>
        </div>

        <div class="status-msg" id="msg">Awaiting Input...</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
