<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="glow-overlay" id="glow"></div>
<button class="theme-toggle" onclick="toggleTheme()" id="theme-icon">🌙</button>

<div class="game-card">
    <div class="score-bar">
        <div>
            <div class="btn-text">PLAYER</div>
            <div id="p-score" class="score-val">0</div>
        </div>
        <div>
            <div class="btn-text">CPU</div>
            <div id="c-score" class="score-val">0</div>
        </div>
    </div>

    <div class="arena">
        <div id="p-hand" class="hand-icon">✊</div>
        <div class="vs-divider" id="vs-text">VS</div>
        <div id="c-hand" class="hand-icon">✊</div>
    </div>

    <div id="status" class="msg-area">CHOOSE YOUR WEAPON</div>

    <div class="btn-group">
        <button class="control-btn" onclick="playGame('rock')">
            <span class="btn-emoji">✊</span><span class="btn-text">ROCK</span>
        </button>
        <button class="control-btn" onclick="playGame('paper')">
            <span class="btn-emoji">✋</span><span class="btn-text">PAPER</span>
        </button>
        <button class="control-btn" onclick="playGame('scissors')">
            <span class="btn-emoji">✌️</span><span class="btn-text">SCISSORS</span>
        </button>
    </div>
</div>

<button class="reset-btn" onclick="resetGame()">RESET SCORE</button>

<script src="script.js"></script>
</body>
</html>
