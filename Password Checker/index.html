<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Analyzer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Password Checker</h2>
        
        <div class="input-group">
            <input type="password" id="passwordInput" placeholder="Type a password...">
            <i class="fa-solid fa-eye-slash" id="toggleIcon"></i>
        </div>

        <div class="strength-meter" id="strengthBar"></div>
        <div class="feedback-text" id="feedback"></div>

        <ul class="requirements">
            <li id="length"><i class="fa-solid fa-circle-xmark"></i> At least 8 characters</li>
            <li id="number"><i class="fa-solid fa-circle-xmark"></i> Contains a number (0-9)</li>
            <li id="lowercase"><i class="fa-solid fa-circle-xmark"></i> Contains a lowercase letter</li>
            <li id="uppercase"><i class="fa-solid fa-circle-xmark"></i> Contains an uppercase letter</li>
            <li id="symbol"><i class="fa-solid fa-circle-xmark"></i> Contains a symbol (!@#$...)</li>
        </ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
